title: "Our Campus in the Food Forest"
headline: "A 15-acre permaculture food forest in the heart of India"
location: "Indore, Central India"
locationHighlight: "The cleanest city in India for 8 times in a row"
description: >
  ALU's upcoming campus in 15 acres of land is our labor of love, a thriving permaculture
  food forest located in Indore - the heart of India and the cleanest city for 8 times in a row.
infrastructure: >
  We are using ancient natural architectural technique of lime and stone with natural materials
  for the infrastructure. Main building with residential space, an open air amphitheater,
  community center, natural pond and camping site is in the making.
features:
