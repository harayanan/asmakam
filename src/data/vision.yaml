title: "Vision"
headline: "A Phygital modern gurukul"
description: "A Phygital modern gurukul focused on"
points:
  - heading: "Creating"
    text: >
      A generation who is not a mere consumer of the system but creating a beautiful
      universe and experiencing Interconnectedness.
  - heading: "Practicing"
    text: >
      Sustainability, Resource optimization, Minimalism, Natural living, Regenerative
      principles, Circular economy and going towards zero outsourcing for learning,
      food and health.
  - heading: "Co Creating"
    text: >
      An integrated lifelong learning path via bringing learners, parents, educators
      and employers together for a life-oriented education in wilderness.
  - heading: "Leveraging"
    text: >
      Multiple forms of wealth - Time, Community, Trust, Technology, Natural Resources,
      Cultural Heritage, local economy and more.

paradigmShift:
