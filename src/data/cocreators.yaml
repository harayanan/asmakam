title: "Co Creators"
intro: >
  Our existence is the most beautiful example of interconnectedness in this universe.
  Asmakam Life University's vision is shared by unique initiatives born out of some
  amazing passionate people's experiments with life, listening whispers of their heart.

featured:
  - name: "Bhoomi Naturals"
    description: >
      This father son duo is creating waves in creating food forests across India. They
      worked hard to transform their 10-acre farmland into a dense and thriving food
      forest through natural farming growing 40 varieties of fruits, vegetables,
      medicinal plants and inspiring many farmers to transition from chemical based
      farming into a beautiful, sustainable profitable food forests. Abhay is an
      energetic youth with fierce desire to change the direction of farming in India.
    focus: "Food Forests & Natural Farming"

  - name: "Urveera"
    tagline: "Learning from Nature"
    description: >
      A technology evangelist and ex CTO Rahul, started his inner energy and found
      solace in his ancestor's cashew farm in Bihar. Seeking spirituality and natural
      living manifested into Urveera co-founded with Sarthak, a young yoga and
      permaculture enthusiast. Their focus is on Permaculture and natural farming,
      natural building, creating native seed bank and overall well being.
    focus: "Bringing people back to nature and oneself"

  - name: "Jeevantika"
    website: "https://www.jeevantika.co.in"
    description: >
      Sakshi and Arpit, an IITian couple who has madly fallen in love with nature.
      After touring the world with a backpack they moved to a small town in MP and
      practice an alternate way of living, which is in sync with nature. Their life is
      natural farming centric, where they grow their own food. They are also very
      passionate about reforestation, yoga and naturopathy.
    focus: "Living in sync with Nature"

  - name: "The Humanist Academy"
    website: "https://www.thehumanistacademy.org"
    location: "Dallas, USA"
    description: >
      THA is founded by Shah family based on life oriented, hands on learning approach.
      They believe in the infinite potential that lies within all human beings. A humanist
      is committed to human development, values, welfare, and integrity. Their mission is
      to inspire everyone who enters their doors to find a calling that will change the world.
      They cultivate the human spirit by providing self-paced, experiential learning in a
      learner-driven and value-based environment, guided by strong personal relationships
      with learners and families.
    focus: "Life-oriented hands-on learning"

  - name: "The Ethos School"
    website: "https://www.theethosschool.org"
    location: "Raleigh, USA"
    description: >
      Founded by a passionate Doctor couple Rashmi and Ankit. Their focus is on cultivating
      holistic education through which powerful character is formed, intellect is expanded,
      and a conscious courageous identity is solidified via self-paced, experiential education
      in a learner-driven and value-based environment, guided by steadfast principles and
      strong interpersonal relationships.
    focus: "Holistic education and character building"

